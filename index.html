<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>V4 GT Tracking Agent</title>
  <style>
    :root{color-scheme:dark}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#070b12;color:#f7f9fc;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.card{width:min(720px,calc(100% - 32px));padding:40px;border:1px solid #243041;border-radius:24px;background:linear-gradient(145deg,#101826,#0b111c);box-shadow:0 28px 80px rgba(0,0,0,.42)}.eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#7ee2a8}.status{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:#10261b;color:#9af0ba;font-size:13px}.dot{width:8px;height:8px;border-radius:50%;background:#56e18d;box-shadow:0 0 16px #56e18d}h1{font-size:clamp(34px,6vw,64px);line-height:1;margin:24px 0 16px}p{font-size:18px;line-height:1.65;color:#b9c4d3}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:28px}.metric{padding:18px;border-radius:16px;background:#0a111c;border:1px solid #1d2a3c}.metric strong{display:block;font-size:24px}.metric span{font-size:12px;color:#8fa1b8}@media(max-width:620px){.card{padding:28px}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="card">
    <div class="status"><span class="dot"></span>Deploy ativo</div>
    <div class="eyebrow">Agnes GrowthOps · V4 Company</div>
    <h1>V4 GT Tracking Agent</h1>
    <p>Servidor MCP privado para diagnóstico, arquitetura, aprovação, QA e execução governada de tracking. O ambiente permanece em <strong>dry_run</strong> por padrão.</p>
    <section class="grid" aria-label="Resumo operacional">
      <div class="metric"><strong>15</strong><span>ferramentas MCP</span></div>
      <div class="metric"><strong>7</strong><span>gates de implantação</span></div>
      <div class="metric"><strong>RLS</strong><span>Supabase protegido</span></div>
    </section>
  </main>
</body>
</html>
